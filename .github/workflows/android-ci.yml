name: Android CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify, lint, and assemble debug APK
        run: ./gradlew --no-daemon :app:testDebugUnitTest :app:lintDebug :app:assembleDebug :baselineprofile:compileNonMinifiedReleaseKotlin

      - name: Upload debug APK and lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hermes-mobile-debug-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/reports/lint-results-debug.html
