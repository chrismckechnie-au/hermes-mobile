name: Android performance

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

concurrency:
  group: android-performance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  send-path:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Benchmark the send path
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_7
          script: |
            python3 scripts/mock_hermes_host.py --port 8766 > "$RUNNER_TEMP/hermes-mock.log" 2>&1 &
            ./gradlew --no-daemon :baselineprofile:connectedNonMinifiedReleaseAndroidTest -Pandroid.testInstrumentationRunnerArguments.androidx.benchmark.enabledRules=Macrobenchmark
            python3 scripts/verify_benchmark_results.py baselineprofile/build/outputs/connected_android_test_additional_output --max-frame-ms 700

      - name: Upload benchmark evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hermes-send-benchmark-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            baselineprofile/build/outputs/connected_android_test_additional_output/**/*benchmarkData.json
            baselineprofile/build/outputs/connected_android_test_additional_output/**/*.perfetto-trace
