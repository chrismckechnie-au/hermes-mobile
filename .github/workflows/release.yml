name: Android release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  signing-readiness:
    runs-on: ubuntu-latest
    environment: release
    outputs:
      signing_ready: ${{ steps.ready.outputs.signing_ready }}
    steps:
      - id: ready
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          HERMES_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          HERMES_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          HERMES_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$ANDROID_KEYSTORE_BASE64" && -n "$GOOGLE_SERVICES_JSON_BASE64" && \
                -n "$HERMES_RELEASE_STORE_PASSWORD" && -n "$HERMES_RELEASE_KEY_ALIAS" && \
                -n "$HERMES_RELEASE_KEY_PASSWORD" ]]; then
            echo "signing_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "signing_ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Signed release packaging is skipped until the release signing and Firebase secrets are configured."
          fi

  build-release:
    needs: signing-readiness
    if: needs.signing-readiness.outputs.signing_ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
      HERMES_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      HERMES_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      HERMES_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Materialize release configuration
        shell: bash
        run: |
          set -euo pipefail
          : "${ANDROID_KEYSTORE_BASE64:?ANDROID_KEYSTORE_BASE64 is not configured}"
          : "${HERMES_RELEASE_STORE_PASSWORD:?ANDROID_KEYSTORE_PASSWORD is not configured}"
          : "${HERMES_RELEASE_KEY_ALIAS:?ANDROID_KEY_ALIAS is not configured}"
          : "${HERMES_RELEASE_KEY_PASSWORD:?ANDROID_KEY_PASSWORD is not configured}"
          : "${GOOGLE_SERVICES_JSON_BASE64:?GOOGLE_SERVICES_JSON_BASE64 is not configured}"
          HERMES_RELEASE_STORE_FILE="$RUNNER_TEMP/hermes-mobile-release.keystore"
          export HERMES_RELEASE_STORE_FILE
          printf 'HERMES_RELEASE_STORE_FILE=%s\n' "$HERMES_RELEASE_STORE_FILE" >> "$GITHUB_ENV"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$HERMES_RELEASE_STORE_FILE"
          printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json
          keytool -list \
            -keystore "$HERMES_RELEASE_STORE_FILE" \
            -storepass "$HERMES_RELEASE_STORE_PASSWORD" \
            -alias "$HERMES_RELEASE_KEY_ALIAS" > /dev/null

      - name: Test, lint, and build signed release artifacts
        run: ./gradlew --no-daemon :app:testDebugUnitTest :app:lintRelease :app:assembleRelease :app:bundleRelease

      - name: Prepare checksummed artifacts
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            label="$GITHUB_REF_NAME"
          else
            label="run-$GITHUB_RUN_NUMBER"
          fi
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "dist/hermes-mobile-${label}.apk"
          cp app/build/outputs/bundle/release/app-release.aab "dist/hermes-mobile-${label}.aab"
          (cd dist && sha256sum *.apk *.aab > SHA256SUMS.txt)

      - name: Upload signed workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-mobile-release-${{ github.run_number }}
          if-no-files-found: error
          retention-days: 30
          path: dist/*

      - name: Attest release provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/*.apk
            dist/*.aab

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes --title "Hermes Mobile $GITHUB_REF_NAME"
          gh release upload "$GITHUB_REF_NAME" dist/* --clobber
